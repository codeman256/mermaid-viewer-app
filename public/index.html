<!DOCTYPE html>
<html lang="en" class="dark">
<!-- Remove class="dark" from <html> to disable dark mode -->
<head>
<meta charset="UTF-8">
<title>Mermaid Diagram Viewer</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<style>
  :root {
    color-scheme: light;
    --bg: #eef2ff;
    --surface: #ffffff;
    --surface-strong: #f8fafc;
    --border: #d1d5db;
    --text: #0f172a;
    --muted: #475569;
    --accent: #4338ca;
    --accent-soft: rgba(67,56,202,0.14);
    --shadow: 0 24px 80px rgba(15,23,42,0.08);
  }
  html.dark {
    color-scheme: dark;
    --bg: #020617;
    --surface: #07132b;
    --surface-strong: #0f172a;
    --border: #334155;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --accent: #8b5cf6;
    --accent-soft: rgba(139,92,246,0.18);
    --shadow: 0 24px 80px rgba(0,0,0,0.4);
  }
  * { box-sizing: border-box; }
  html, body {
    height: 100%;
    margin: 0;
  }
  body {
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex;
    min-height: 100%;
    color: var(--text);
    background: radial-gradient(circle at top left, rgba(139,92,246,0.12), transparent 24%), var(--bg);
    transition: background 0.3s ease, color 0.3s ease;
  }
  #sidebar {
    width: 300px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 1.5rem 1.25rem;
    background: var(--surface);
    box-shadow: inset -1px 0 0 rgba(255,255,255,0.05);
  }
  #sidebar h2 {
    font-size: 0.92rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin: 0 0 1rem 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  #live-dot {
    width: 10px;
    height: 10px;
    border-radius: 999px;
    background: #64748b;
    display: inline-block;
    box-shadow: 0 0 0 4px rgba(99,102,241,0.12);
  }
  #live-dot.connected { background: #22c55e; box-shadow: 0 0 0 4px rgba(34,197,94,0.14); }
  #file-search-wrap {
    position: relative;
    margin-bottom: 0.85rem;
  }
  #file-search {
    width: 100%;
    box-sizing: border-box;
    padding: 0.55rem 2rem 0.55rem 0.8rem;
    border-radius: 0.75rem;
    border: 1px solid var(--border);
    background: var(--surface-strong);
    color: var(--text);
    font-size: 0.9rem;
  }
  #file-search:focus {
    outline: none;
    border-color: var(--accent);
  }
  /* Hide native WebKit/Chromium "x" clear button — we render our own so it's consistent cross-browser */
  #file-search::-webkit-search-cancel-button { display: none; }
  #file-search-clear {
    position: absolute;
    right: 0.4rem;
    top: 50%;
    transform: translateY(-50%);
    border: none;
    background: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1.1rem;
    line-height: 1;
    padding: 0.25rem 0.4rem;
    border-radius: 999px;
  }
  #file-search-clear:hover { background: var(--accent-soft); color: var(--text); }
  #file-list { list-style: none; padding: 0; margin: 0; display: grid; gap: 0.35rem; }
  #file-list li.hidden { display: none; }
  #file-list li {
    padding: 0.8rem 0.95rem;
    cursor: pointer;
    border-radius: 0.85rem;
    font-size: 0.94rem;
    word-break: break-word;
    background: transparent;
    border: 1px solid transparent;
    color: var(--text);
    transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease;
  }
  #file-list li:hover { background: var(--surface-strong); border-color: var(--accent-soft); }
  #file-list li.active { background: var(--accent-soft); border-color: rgba(67,56,202,0.24); font-weight: 600; }
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 1.75rem 2rem;
    overflow: hidden;
  }
  #diagram-title { font-size: 1.3rem; margin-bottom: 1rem; color: var(--text); }
  #diagram-controls {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 0.6rem;
    margin-bottom: 0.9rem;
  }
  #diagram-controls button {
    border: 1px solid var(--border);
    border-radius: 999px;
    background: var(--surface);
    color: var(--text);
    padding: 0.65rem 0.95rem;
    font-size: 0.95rem;
    cursor: pointer;
    transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
  }
  #diagram-controls button:hover {
    transform: translateY(-1px);
    background: var(--surface-strong);
    border-color: var(--accent-soft);
  }
  .theme-toggle-top {
    position: absolute;
    top: 1rem;
    right: 2rem;
    z-index: 40;
    border-radius: 999px;
    padding: 0.45rem 0.65rem;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    cursor: pointer;
    box-shadow: 0 6px 18px rgba(0,0,0,0.06);
  }
  #diagram-controls span {
    color: var(--muted);
    font-size: 0.95rem;
    margin-left: auto;
  }
  #diagram-container {
    border: 1px solid var(--border);
    border-radius: 1.25rem;
    position: relative;
    overflow: hidden;
    flex: 1;
    min-height: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--surface);
    box-shadow: var(--shadow);
  }
  #diagram-viewport {
    position: absolute;
    top: 0;
    left: 0;
    transform-origin: 0 0;
    cursor: grab;
    touch-action: none;
  }
  #diagram-viewport.grabbing {
    cursor: grabbing;
  }
  #diagram-container svg {
    display: block;
    max-width: none;
    max-height: none;
  }
  .empty-state, .status { color: #999; text-align: center; }
  .error-box { color: #b91c1c; white-space: pre-wrap; font-family: monospace; font-size: 0.85rem; }
</style>
</head>
<body>
  <div id="sidebar">
    <h2>Diagrams <span id="live-dot" title="Live connection status"></span></h2>
    <div id="file-search-wrap">
      <input type="search" id="file-search" placeholder="Filter diagrams…" aria-label="Filter diagrams">
      <button type="button" id="file-search-clear" aria-label="Clear filter" hidden>×</button>
    </div>
    <ul id="file-list"><li class="status">Loading…</li></ul>
  </div>
  <div id="main">
    <button id="theme-toggle" class="theme-toggle-top" type="button" aria-pressed="false">Dark Mode</button>
    <div id="diagram-title"></div>
    <div id="diagram-controls">
      <button id="zoom-out" type="button">−</button>
      <button id="zoom-reset" type="button">100%</button>
      <button id="zoom-in" type="button">+</button>
      <button id="fit-screen" type="button">Fit</button>
      <button id="fit-width" type="button">Go to Beginning</button>
      <button id="share-btn" type="button" disabled>Share</button>
      <span id="zoom-label">100%</span>
    </div>
    <div id="diagram-container">
      <div class="empty-state">Select a file from the left to view its diagram.</div>
    </div>
  </div>

<script>
  const fileListEl = document.getElementById('file-list');
  const diagramContainer = document.getElementById('diagram-container');
  const diagramTitle = document.getElementById('diagram-title');
  const liveDot = document.getElementById('live-dot');
  const zoomOutBtn = document.getElementById('zoom-out');
  const zoomResetBtn = document.getElementById('zoom-reset');
  const zoomInBtn = document.getElementById('zoom-in');
  const fitScreenBtn = document.getElementById('fit-screen');
  const themeToggleBtn = document.getElementById('theme-toggle');
  const fitWidthBtn = document.getElementById('fit-width');
  const zoomLabel = document.getElementById('zoom-label');
  const themeStorageKey = 'mermaid-viewer-theme';
  let renderCount = 0;
  let currentFile = null;
  let zoom = 1;
  let panX = 0;
  let panY = 0;
  let isDragging = false;
  let dragStartX = 0;
  let dragStartY = 0;
  let viewport = null;
  let currentCode = null;
  let pointerDownTarget = null;
  let pointerDownX = 0;
  let pointerDownY = 0;
  let fileFilterQuery = '';
  const fileSearchInput = document.getElementById('file-search');
  const fileSearchClearBtn = document.getElementById('file-search-clear');
  const shareBtn = document.getElementById('share-btn');

  function initializeMermaidTheme(theme) {
    mermaid.initialize({
      startOnLoad: false,
      securityLevel: 'loose',
      theme: theme === 'dark' ? 'dark' : 'default',
    });
  }

  // Mermaid renders the svg with width="100%" and an inline
  // style="max-width: Npx" for in-page responsiveness. Inline styles beat any
  // stylesheet rule, so that constrains the svg's real rendered size independent
  // of our transform-based zoom/pan — throwing off every size calculation.
  // Strip it and pin the svg to its intrinsic pixel size instead.
  function normalizeSvgSize(svg, dims) {
    svg.removeAttribute('style');
    svg.setAttribute('width', dims.width);
    svg.setAttribute('height', dims.height);
  }

  // Diagram sources style individual nodes with explicit light `fill:` colors
  // but never set text color, so node text is entirely theme-dependent. In
  // dark mode, mermaid's default (light) text becomes unreadable against those
  // explicitly light-filled nodes. Force dark text on light-filled nodes only
  // — this touches the rendered DOM only, never the .mmd source.
  const DARK_NODE_TEXT_COLOR = '#0f172a';
  const LIGHT_FILL_LUMA_THRESHOLD = 128;

  function parseRgb(str) {
    if (!str) return null;
    const m = str.match(/rgba?\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)/i);
    if (m) return { r: +m[1], g: +m[2], b: +m[3] };
    const h = str.trim().match(/^#([0-9a-f]{3}|[0-9a-f]{6})$/i);
    if (h) {
      let hex = h[1];
      if (hex.length === 3) hex = hex.split('').map(c => c + c).join('');
      const n = parseInt(hex, 16);
      return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
    }
    return null;
  }

  function isLight({ r, g, b }) {
    return (r * 299 + g * 587 + b * 114) / 1000 >= LIGHT_FILL_LUMA_THRESHOLD;
  }

  function fixDarkModeNodeContrast(svgEl) {
    if (!document.documentElement.classList.contains('dark')) return;
    svgEl.querySelectorAll('g.node').forEach((g) => {
      const shape = g.querySelector('rect, polygon, circle, ellipse, path');
      if (!shape) return;
      const rgb = parseRgb(window.getComputedStyle(shape).fill);
      if (!rgb || !isLight(rgb)) return;
      const label = g.querySelector('.nodeLabel');
      if (label) label.style.color = DARK_NODE_TEXT_COLOR;
    });
  }

  async function renderDiagram(code, { preserveView = false } = {}) {
    const id = 'mermaid-diagram-' + (renderCount++);
    const { svg } = await mermaid.render(id, code);
    diagramContainer.innerHTML = '<div id="diagram-viewport">' + svg + '</div>';
    viewport = document.getElementById('diagram-viewport');
    const svgEl = viewport.querySelector('svg');
    if (svgEl) {
      normalizeSvgSize(svgEl, getSvgDimensions(svgEl));
      fixDarkModeNodeContrast(svgEl);
    }
    createPanZoom();
    if (preserveView) {
      updateTransform();
    } else {
      window.requestAnimationFrame(() => fitToScreen());
    }
  }

  function updateTransform() {
    if (!viewport) return;
    viewport.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`;
    zoomLabel.textContent = `${Math.round(zoom * 100)}%`;
  }

  // Zooms while keeping the content under (pivotX, pivotY) — in
  // #diagram-container's own coordinate space — visually fixed on screen.
  const ZOOM_STEP_FACTOR = 1.1; // multiplicative ~10% per step

  function zoomAtPoint(newZoomRaw, pivotX, pivotY) {
    const oldZoom = zoom;
    const nextZoom = Math.max(0.05, Math.min(10, newZoomRaw));
    if (nextZoom === oldZoom) return;
    zoom = nextZoom;
    const ratio = zoom / oldZoom;
    panX = pivotX - ratio * (pivotX - panX);
    panY = pivotY - ratio * (pivotY - panY);
    updateTransform();
  }

  function centerDiagram() {
    if (!viewport) return;
    const svg = viewport.querySelector('svg');
    if (!svg) return;
    const dims = getSvgDimensions(svg);
    const containerRect = diagramContainer.getBoundingClientRect();
    panX = (containerRect.width - dims.width * zoom) / 2;
    panY = (containerRect.height - dims.height * zoom) / 2;
    updateTransform();
  }

  function resetView() {
    zoom = 1;
    centerDiagram();
  }

  function getSvgDimensions(svg) {
    const widthAttr = svg.getAttribute('width');
    const heightAttr = svg.getAttribute('height');
    let width = 0;
    let height = 0;

    if (widthAttr && !widthAttr.includes('%')) {
      width = parseFloat(widthAttr) || 0;
    }
    if (heightAttr && !heightAttr.includes('%')) {
      height = parseFloat(heightAttr) || 0;
    }

    if ((!width || !height) && svg.viewBox && svg.viewBox.baseVal) {
      width = width || svg.viewBox.baseVal.width;
      height = height || svg.viewBox.baseVal.height;
    }

    if ((!width || !height) && typeof svg.getBBox === 'function') {
      const bbox = svg.getBBox();
      width = width || bbox.width;
      height = height || bbox.height;
    }

    return {
      width: width || 1,
      height: height || 1,
    };
  }

  function applyTheme(theme) {
    if (theme === 'dark') {
      document.documentElement.classList.add('dark');
      themeToggleBtn.textContent = 'Light Mode';
      themeToggleBtn.setAttribute('aria-pressed', 'true');
    } else {
      document.documentElement.classList.remove('dark');
      themeToggleBtn.textContent = 'Dark Mode';
      themeToggleBtn.setAttribute('aria-pressed', 'false');
    }
  }

  function getSavedTheme() {
    const saved = localStorage.getItem(themeStorageKey);
    if (saved === 'light' || saved === 'dark') return saved;
    return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  }

  function fitToScreen() {
    if (!viewport) return;
    const svg = viewport.querySelector('svg');
    if (!svg) return;

    const dims = getSvgDimensions(svg);
    if (!dims.width || !dims.height) return;

    const containerRect = diagramContainer.getBoundingClientRect();
    const availableWidth = containerRect.width;
    const availableHeight = containerRect.height;
    const scale = Math.min(availableWidth / dims.width, availableHeight / dims.height, 10);

    zoom = Math.max(0.05, Math.min(scale, 10));
    panX = (availableWidth - dims.width * zoom) / 2;
    panY = (availableHeight - dims.height * zoom) / 2;
    updateTransform();
  }

  // Fits the diagram for readability rather than literally "fit its width":
  // tall/skinny diagrams (TD-style flowcharts) fit to the container's width
  // and anchor to the top, so the reader starts at the top and pans down.
  // Wide/short diagrams (LR-style flowcharts) fit to the container's height
  // and anchor to the left, so the reader starts at the left and pans right.
  function fitWidth() {
    if (!viewport) return;
    const svg = viewport.querySelector('svg');
    if (!svg) return;

    const dims = getSvgDimensions(svg);
    if (!dims.width || !dims.height) return;

    const containerRect = diagramContainer.getBoundingClientRect();
    const availableWidth = containerRect.width;
    const availableHeight = containerRect.height;
    const isTall = dims.height >= dims.width;
    const scale = isTall ? availableWidth / dims.width : availableHeight / dims.height;

    zoom = Math.max(0.05, Math.min(scale, 10));
    if (isTall) {
      panX = (availableWidth - dims.width * zoom) / 2;
      panY = 0;
    } else {
      panX = 0;
      panY = (availableHeight - dims.height * zoom) / 2;
    }
    updateTransform();
  }

  function centerOnScreen() {
    if (!viewport) return;
    const svg = viewport.querySelector('svg');
    if (!svg) return;
    const dims = getSvgDimensions(svg);
    const containerRect = diagramContainer.getBoundingClientRect();
    panX = (containerRect.width - dims.width * zoom) / 2;
    panY = (containerRect.height - dims.height * zoom) / 2;
    updateTransform();
  }

  // Diagrams can link to other diagrams via `click nodeId href "?file=other.mmd"`
  // (rendered by mermaid as an SVG <a>, with the link set via the legacy
  // xlink:href attribute rather than plain href). We can't rely on the
  // browser's native "click" event to detect this: viewport.setPointerCapture()
  // below (needed for drag-to-pan) redirects/suppresses the click event that
  // would normally follow a pointerdown/pointerup pair on many engines, so a
  // tap on a node link silently does nothing. Instead we detect "was this a
  // tap, not a drag" ourselves in the pointerdown/pointerup pair we already
  // control, using the pointerdown's original target (captured before any
  // retargeting) rather than trusting the click event at all.
  const TAP_MOVEMENT_THRESHOLD = 4; // px

  function tryHandleLinkTap(targetEl, event) {
    if (!targetEl || !targetEl.closest) return;
    const anchor = targetEl.closest('a');
    if (!anchor) return;
    const href = anchor.getAttribute('href') || anchor.getAttribute('xlink:href');
    if (!href) return;
    let url;
    try { url = new URL(href, window.location.href); } catch { return; }
    if (url.origin !== window.location.origin) return; // external link, let it behave normally
    const target = url.searchParams.get('file');
    if (!target) return; // not a recognized in-app link
    if (event && event.preventDefault) event.preventDefault();
    const li = [...fileListEl.children].find(el => el.dataset.file === target);
    selectFile(target, li || null);
  }

  function createPanZoom() {
    viewport = document.getElementById('diagram-viewport');
    if (!viewport) return;

    viewport.addEventListener('wheel', (event) => {
      event.preventDefault();
      const rect = diagramContainer.getBoundingClientRect(); // container, not viewport
      const pivotX = event.clientX - rect.left;
      const pivotY = event.clientY - rect.top;
      const factor = event.deltaY < 0 ? ZOOM_STEP_FACTOR : 1 / ZOOM_STEP_FACTOR;
      zoomAtPoint(zoom * factor, pivotX, pivotY);
    }, { passive: false });

    viewport.addEventListener('pointerdown', (event) => {
      if (event.button !== 0) return;
      isDragging = true;
      dragStartX = event.clientX;
      dragStartY = event.clientY;
      pointerDownTarget = event.target;
      pointerDownX = event.clientX;
      pointerDownY = event.clientY;
      viewport.classList.add('grabbing');
      viewport.setPointerCapture(event.pointerId);
    });

    viewport.addEventListener('pointermove', (event) => {
      if (!isDragging) return;
      const dx = event.clientX - dragStartX;
      const dy = event.clientY - dragStartY;
      dragStartX = event.clientX;
      dragStartY = event.clientY;
      panX += dx;
      panY += dy;
      updateTransform();
    });

    viewport.addEventListener('pointerup', (event) => {
      isDragging = false;
      viewport.classList.remove('grabbing');
      viewport.releasePointerCapture(event.pointerId);
      const moved = Math.hypot(event.clientX - pointerDownX, event.clientY - pointerDownY);
      if (moved < TAP_MOVEMENT_THRESHOLD) {
        tryHandleLinkTap(pointerDownTarget, event);
      }
      pointerDownTarget = null;
    });

    viewport.addEventListener('pointerleave', () => {
      if (!isDragging) return;
      isDragging = false;
      viewport.classList.remove('grabbing');
    });
  }

  zoomOutBtn.addEventListener('click', () => {
    const rect = diagramContainer.getBoundingClientRect();
    zoomAtPoint(zoom / ZOOM_STEP_FACTOR, rect.width / 2, rect.height / 2);
  });

  zoomInBtn.addEventListener('click', () => {
    const rect = diagramContainer.getBoundingClientRect();
    zoomAtPoint(zoom * ZOOM_STEP_FACTOR, rect.width / 2, rect.height / 2);
  });

  fitScreenBtn.addEventListener('click', fitToScreen);
  fitWidthBtn.addEventListener('click', fitWidth);

  // Only needed if the app runs behind a reverse proxy under a different
  // public hostname than Node sees — lets Share always emit that canonical
  // hostname. If unset, the actual visited URL (window.location.href) is used
  // as-is, which is already correct for the common case.
  let publicBaseUrl = '';
  fetch('/api/config').then(r => r.json()).then(cfg => { publicBaseUrl = cfg.publicBaseUrl || ''; }).catch(() => {});

  function currentShareUrl() {
    if (!publicBaseUrl) return window.location.href;
    return publicBaseUrl + window.location.pathname + window.location.search;
  }

  let shareResetTimer = null;
  shareBtn.addEventListener('click', async () => {
    if (!currentFile) return;
    try {
      await navigator.clipboard.writeText(currentShareUrl());
      shareBtn.textContent = 'Copied!';
    } catch {
      shareBtn.textContent = 'Copy failed';
    }
    clearTimeout(shareResetTimer);
    shareResetTimer = setTimeout(() => { shareBtn.textContent = 'Share'; }, 1500);
  });

  themeToggleBtn.addEventListener('click', async () => {
    const isDark = document.documentElement.classList.toggle('dark');
    const theme = isDark ? 'dark' : 'light';
    localStorage.setItem(themeStorageKey, theme);
    applyTheme(theme);
    initializeMermaidTheme(theme);
    if (currentCode) {
      try {
        await renderDiagram(currentCode, { preserveView: true });
      } catch (err) {
        diagramContainer.innerHTML = '<pre class="error-box">Error rendering diagram:\n' + err.message + '</pre>';
      }
    }
  });

  const initialTheme = getSavedTheme();
  applyTheme(initialTheme);
  initializeMermaidTheme(initialTheme);

  zoomResetBtn.addEventListener('click', resetView);
  // Avoid duplicate listener registration

  async function loadFileList() {
    try {
      const res = await fetch('/api/list');
      const files = await res.json();
      fileListEl.innerHTML = '';
      if (files.length === 0) {
        fileListEl.innerHTML = '<li class="status">No .mmd files found</li>';
        return;
      }
      files.forEach(name => {
        const displayName = name.replace(/\.mmd$/i, '').split('/').join(' / ');
        const li = document.createElement('li');
        li.textContent = displayName;
        li.dataset.file = name;
        if (name === currentFile) li.classList.add('active');
        li.addEventListener('click', () => selectFile(name, li));
        fileListEl.appendChild(li);
      });
      applyFileFilter();
    } catch (err) {
      fileListEl.innerHTML = '<li class="status">Could not reach server</li>';
    }
  }

  function applyFileFilter() {
    [...fileListEl.children].forEach((li) => {
      if (!li.dataset.file) return; // skip "Loading…"/"No files"/status placeholders
      const match = !fileFilterQuery || li.textContent.toLowerCase().includes(fileFilterQuery);
      li.classList.toggle('hidden', !match);
    });
  }

  function updateSearchClearVisibility() {
    fileSearchClearBtn.hidden = fileSearchInput.value.length === 0;
  }

  fileSearchInput.addEventListener('input', () => {
    fileFilterQuery = fileSearchInput.value.trim().toLowerCase();
    applyFileFilter();
    updateSearchClearVisibility();
  });

  fileSearchClearBtn.addEventListener('click', () => {
    fileSearchInput.value = '';
    fileFilterQuery = '';
    applyFileFilter();
    updateSearchClearVisibility();
    fileSearchInput.focus();
  });

  async function selectFile(name, li) {
    currentFile = name;
    document.querySelectorAll('#file-list li').forEach(el => el.classList.remove('active'));
    if (li) li.classList.add('active');
    const displayTitle = name.replace(/\.mmd$/i, '').split('/').join(' / ');
    diagramTitle.textContent = displayTitle;
    diagramContainer.innerHTML = '<div class="status">Loading…</div>';

    try {
      const res = await fetch('/api/file?path=' + encodeURIComponent(name));
      if (!res.ok) throw new Error('File not found on server');
      const code = await res.text();
      currentCode = code;
      await renderDiagram(code);
      history.pushState(null, '', '?file=' + encodeURI(name));
      shareBtn.disabled = false;
    } catch (err) {
      currentCode = null;
      diagramContainer.innerHTML = '<pre class="error-box">Error rendering diagram:\n' + err.message + '</pre>';
    }
  }

  window.addEventListener('resize', () => {
    fitToScreen();
  });

  // Live refresh: server pushes an event whenever the diagrams folder changes
  // (new files added, git pull brought in updates, etc.)
  function connectLiveUpdates() {
    const es = new EventSource('/api/events');
    es.onopen = () => liveDot.classList.add('connected');
    es.onerror = () => {
      liveDot.classList.remove('connected');
      // browser auto-reconnects EventSource; nothing else to do
    };
    es.addEventListener('files-changed', async () => {
      await loadFileList();
      if (currentFile) {
        // re-render current diagram in case it was the one that changed
        const activeLi = [...fileListEl.children].find(li => li.dataset.file === currentFile);
        selectFile(currentFile, activeLi);
      }
    });
  }

  window.addEventListener('popstate', () => {
    const target = new URLSearchParams(location.search).get('file');
    if (!target || target === currentFile) return; // ignore no-op / our own pushState
    const li = [...fileListEl.children].find(el => el.dataset.file === target);
    if (li) selectFile(target, li);
  });

  (async () => {
    await loadFileList();
    const initialTarget = new URLSearchParams(location.search).get('file');
    if (initialTarget) {
      const li = [...fileListEl.children].find(el => el.dataset.file === initialTarget);
      if (li) selectFile(initialTarget, li);
    }
  })();
  connectLiveUpdates();
</script>
</body>
</html>
